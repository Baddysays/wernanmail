server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://admin:8090;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /healthz {
    proxy_pass http://admin:8090/healthz;
  }

  location / {
    try_files $uri /index.html;
  }
}
