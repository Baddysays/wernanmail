server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  ssl_certificate /run/tls/fullchain.pem;
  ssl_certificate_key /run/tls/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:5m;

  location = /admin {
    return 301 /admin/;
  }

  location /admin/ {
    try_files $uri $uri/ /admin/index.html;
  }

  location /api/admin/ {
    proxy_pass http://admin:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /healthz {
    access_log off;
    proxy_pass http://api:8080/healthz;
  }

  location = /readyz {
    access_log off;
    proxy_pass http://admin:8090/readyz;
  }

  location = /metrics {
    access_log off;
    proxy_pass http://admin:8090/metrics;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}